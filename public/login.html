<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Lapok IMS — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;background:linear-gradient(135deg,#0F172A,#1E293B);color:#fff;padding:1rem}
    .card{width:100%;max-width:400px;background:#fff;color:#0F172A;border-radius:14px;padding:2rem;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
    .mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#E53E3E,#DC2626);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
    h1{font-size:1.25rem;font-weight:700}
    p.sub{font-size:.85rem;color:#64748B;margin-top:.25rem;margin-bottom:1.25rem}
    label{display:block;font-size:.78rem;font-weight:600;margin-bottom:.35rem;color:#334155}
    input{width:100%;padding:.75rem .85rem;border:1.5px solid #E2E8F0;border-radius:8px;font:inherit;margin-bottom:1rem}
    input:focus{outline:none;border-color:#E53E3E;box-shadow:0 0 0 3px rgba(229,62,62,.15)}
    button{width:100%;padding:.85rem;border:none;border-radius:8px;background:linear-gradient(135deg,#E53E3E,#DC2626);color:#fff;font:inherit;font-weight:600;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .err{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;border-radius:8px;padding:.65rem .85rem;font-size:.85rem;margin-bottom:1rem;display:none}
    .hint{margin-top:1rem;font-size:.75rem;color:#94A3B8;line-height:1.5}
    code{background:#F1F5F9;padding:.1rem .35rem;border-radius:4px;font-size:.72rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="mark">CC</div>
      <div>
        <h1>Lapok IMS</h1>
        <p class="sub">CC Outlet — Kampala Branch</p>
      </div>
    </div>
    <div class="err" id="err"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="username" placeholder="name@company.com"/>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Enter your password"/>
      <button type="submit" id="btn">Sign in</button>
    </form>
    <p class="hint">Use your assigned account. Contact your administrator if access is required.</p>
  </div>
  <script src="js/lapok.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');

    LapokAPI.me().then((data) => {
      if (data.authenticated) window.location.href = 'index.html';
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        await LapokAPI.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        window.location.href = 'index.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
