<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — Lapok DMS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F172A,#1E293B);padding:1rem}
.card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{width:48px;height:48px;background:linear-gradient(135deg,#E53E3E,#DC2626);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;margin-bottom:1rem}
h1{font-size:1.35rem;margin-bottom:.25rem;color:#0F172A}
.sub{font-size:.85rem;color:#64748B;margin-bottom:1.5rem}
label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.35rem;color:#334155}
input{width:100%;padding:.75rem;border:1.5px solid #E2E8F0;border-radius:8px;font-size:.95rem;margin-bottom:1rem}
input:focus{outline:none;border-color:#E53E3E;box-shadow:0 0 0 3px #FEE2E2}
button{width:100%;padding:.85rem;border:none;border-radius:8px;background:linear-gradient(135deg,#E53E3E,#DC2626);color:#fff;font-weight:600;font-size:.95rem;cursor:pointer}
button:disabled{opacity:.6;cursor:not-allowed}
.err{background:#FEE2E2;color:#991B1B;padding:.65rem .85rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
.hint{margin-top:1.25rem;font-size:.75rem;color:#94A3B8;line-height:1.5}
.hint code{background:#F1F5F9;padding:2px 6px;border-radius:4px;font-size:.7rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">LV</div>
  <h1>Lapok DMS</h1>
  <p class="sub">Inventory &amp; Distribution — Gulu, Uganda</p>
  <div class="err" id="err"></div>
  <form id="loginForm">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="username" value="admin@lapok.ug">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password" value="password123">
    <button type="submit" id="btn">Sign in</button>
  </form>
  <p class="hint">Password for all accounts: <code>password123</code></p>
  <ul class="hint accounts" style="margin-top:.6rem;padding-left:1.1rem;line-height:1.7">
    <li><code>admin@lapok.ug</code> — Admin</li>
    <li><code>executive@lapok.ug</code> — Executive</li>
    <li><code>manager@lapok.ug</code> — Manager</li>
    <li><code>accountant@lapok.ug</code> — Accountant (RDC)</li>
    <li><code>cadet@lapok.ug</code> — Cadet</li>
    <li><code>driver@lapok.ug</code> — Driver</li>
  </ul>
</div>
<script src="assets/api.js"></script>
<script>
(async () => {
  try {
    const me = await LapokAPI.get('/api/auth/me.php');
    if (me.user) location.href = 'index.html';
  } catch (_) {}
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    await LapokAPI.post('/api/auth/login.php', {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    });
    location.href = 'index.html';
  } catch (ex) {
    err.textContent = ex.message || 'Login failed';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
